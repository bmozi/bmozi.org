<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">BMOZI Technical mark</title>
  <desc id="desc">A readable blue B mark with a magenta technical signal for BMOZI Technical.</desc>
  <defs>
    <linearGradient id="bmozi-blue" x1="44" y1="34" x2="214" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2E73F1"/>
      <stop offset=".56" stop-color="#2AA9FF"/>
      <stop offset="1" stop-color="#19D6C5"/>
    </linearGradient>
    <linearGradient id="bmozi-magenta" x1="72" y1="114" x2="184" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4FD8"/>
      <stop offset=".72" stop-color="#E23CA5"/>
      <stop offset="1" stop-color="#19D6C5"/>
    </linearGradient>
    <filter id="mark-glow" x="-14%" y="-14%" width="128%" height="128%">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .10 0 0 0 0 .70 0 0 0 0 1 0 0 0 .28 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="b-clip">
      <text x="32" y="210" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="206" font-weight="900">B</text>
    </clipPath>
  </defs>
  <rect width="256" height="256" fill="#071019"/>
  <g filter="url(#mark-glow)">
    <text x="32" y="210" fill="url(#bmozi-blue)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="206" font-weight="900">B</text>
    <g clip-path="url(#b-clip)">
      <rect x="63" y="118" width="122" height="38" fill="url(#bmozi-magenta)"/>
      <path d="M105 157C127 139 159 139 190 157V185H88V165C92 162 98 160 105 157Z" fill="#071019" opacity=".7"/>
      <rect x="48" y="86" width="40" height="128" fill="#2E73F1"/>
    </g>
  </g>
</svg>
